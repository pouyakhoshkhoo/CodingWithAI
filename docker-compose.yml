services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: property
      POSTGRES_PASSWORD: change-me-local
      POSTGRES_DB: property_marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  postgres_data:
